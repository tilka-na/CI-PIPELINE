name: TP5
on:
  push:
    branches:
        - main
  pull_request:
    branches: 
        - main
  workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: recuperer le code
              uses: actions/ckeckout@v4
            - name: installer python
              uses: actions/setup-pyhton@v5
              with:
                python-version: "3.11"
            - name: installer les dependencies
              run: pip install -r requirements.txt
            - name: installer flake8
              run: |
               flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
               flake8 app --count --max-complexity=10 --max-line-lenght=127 --statistics
               flake8 tests --count  --max-line-lenght=127 --statistics
            - name: lancer le test
              run : pytest -v --cov=app





